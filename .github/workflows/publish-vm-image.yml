name: Publish production VM image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-production-vm-image
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: production
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/camka14/mvp-site:${{ github.sha }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bracket-iq.com
            NEXT_PUBLIC_SITE_URL=https://bracket-iq.com
            NEXT_PUBLIC_WEB_BASE_URL=https://bracket-iq.com
            NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_API_KEY }}
            NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID=${{ vars.NEXT_PUBLIC_GOOGLE_MAPS_MAP_ID }}
            NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
            NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN=${{ secrets.NEXT_PUBLIC_POSTHOG_PROJECT_TOKEN }}
            NEXT_PUBLIC_MVP_ANDROID_DEEP_LINK=${{ vars.NEXT_PUBLIC_MVP_ANDROID_DEEP_LINK }}
            NEXT_PUBLIC_MVP_ANDROID_PLAY_STORE_URL=${{ vars.NEXT_PUBLIC_MVP_ANDROID_PLAY_STORE_URL }}
            NEXT_PUBLIC_MVP_IOS_APP_STORE_URL=${{ vars.NEXT_PUBLIC_MVP_IOS_APP_STORE_URL }}
            NEXT_PUBLIC_MVP_IOS_DEEP_LINK=${{ vars.NEXT_PUBLIC_MVP_IOS_DEEP_LINK }}
