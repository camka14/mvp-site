name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/bracketiq_ci
      JWT_SECRET: bracketiq-ci-only-secret-not-used-outside-tests
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run prisma:validate

      - name: Run route-inclusive tests and coverage gates
        run: npm run test:ci

      - name: Type-check
        run: npx tsc --noEmit
